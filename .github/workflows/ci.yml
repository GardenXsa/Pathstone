name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore MyGame.sln
        working-directory: desktop-app

      - name: Build
        run: dotnet build MyGame.sln -c Release --no-restore
        working-directory: desktop-app

      - name: Test
        run: dotnet test MyGame.sln -c Release --no-build --logger trx --collect:"XPlat Code Coverage"
        working-directory: desktop-app

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/**'
          if-no-files-found: ignore

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ubuntu-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ubuntu-nuget-

      - name: Restore
        run: dotnet restore MyGame.sln
        working-directory: desktop-app

      - name: Check formatting
        run: dotnet format MyGame.sln --verify-no-changes --verbosity diagnostic
        working-directory: desktop-app
